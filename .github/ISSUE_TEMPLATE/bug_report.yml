name: Bug report
description: Report a problem with greengrass-ipc
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. This is an unofficial, community project — please provide enough
        detail to reproduce the issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a code snippet that triggers the issue.
    validations:
      required: true
  - type: input
    id: crate-version
    attributes:
      label: greengrass-ipc version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: nucleus-version
    attributes:
      label: Greengrass nucleus version (if relevant)
      placeholder: "2.17.0"
  - type: input
    id: env
    attributes:
      label: Platform / Rust version
      placeholder: "aarch64 Linux (glibc 2.35), rustc 1.94.1"
  - type: textarea
    id: logs
    attributes:
      label: Logs / errors
      description: Relevant output. Please redact any tokens, ARNs, or account IDs.
      render: text
