name: Feature request
description: Suggest an operation or capability for greengrass-ipc
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or the missing capability.
    validations:
      required: true
  - type: input
    id: operation
    attributes:
      label: Specific IPC operation (if applicable)
      description: e.g. `GetThingShadow`, `SubscribeToCertificateUpdates`.
      placeholder: "aws.greengrass#..."
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or approach
      description: Optional — how you imagine it working.
